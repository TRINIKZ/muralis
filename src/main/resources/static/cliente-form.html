<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Cliente — Muralis</title>
	<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
	<canvas id="bg-canvas" aria-hidden="true"></canvas>
	<header class="site-header">
		<div class="inner">
			<a class="logo" href="/index.html">PROJECT 01 - MURALIS</a>
			<nav>
				<a href="/clientes.html">Clientes</a>
			</nav>
		</div>
	</header>
	<main>
		<h1 id="titulo">Novo cliente</h1>
		<div id="msg"></div>
		<form id="form">
			<div class="form-grid">
				<div>
					<label for="nome">Nome</label>
					<input type="text" id="nome" name="nome" required maxlength="200" />
				</div>
				<div>
					<label for="cpf">CPF</label>
					<input type="text" id="cpf" name="cpf" required maxlength="14" placeholder="000.000.000-00" />
				</div>
				<div>
					<label for="dataNascimento">Data de nascimento</label>
					<input type="date" id="dataNascimento" name="dataNascimento" required />
				</div>
				<div style="grid-column:1/-1">
					<label for="endereco">Endereço</label>
					<textarea id="endereco" name="endereco" maxlength="500"></textarea>
				</div>
			</div>
			<div class="form-actions">
				<button type="submit">Salvar</button>
				<a class="btn btn-secondary" href="/clientes.html">Cancelar</a>
			</div>
		</form>
	</main>
	<script src="/js/musgrave-bg.js"></script>
	<script src="/js/format.js"></script>
	<script src="/js/api.js"></script>
	<script src="/js/cliente-form.js"></script>
</body>
</html>
